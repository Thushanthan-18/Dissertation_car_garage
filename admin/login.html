<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AutoCare Pro</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page admin-auth">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="../images/logo.png" alt="AutoCare Pro Logo" class="auth-logo">
                <h1>Admin Portal</h1>
                <p>Enter your credentials to access the admin dashboard</p>
            </div>
            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="staffId">
                        <i class="fas fa-id-badge"></i>
                        Staff ID
                    </label>
                    <input type="text" class="form-control" id="staffId" name="staffId" 
                           placeholder="Enter your staff ID (e.g., ST1234)" 
                           pattern="[A-Z]{2}[0-9]{4}" 
                           title="Staff ID format: 2 letters followed by 4 numbers (e.g., ST1234)" 
                           required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter your password"
                           required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Keep me signed in</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In to Dashboard
                </button>
            </form>
            <div class="auth-footer">
                <a href="../index.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Website
                </a>
            </div>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
